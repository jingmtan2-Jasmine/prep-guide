<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>胃肠镜检查术前准备指引生成</title>
    <style>
        :root {
            /* 卓正医疗品牌色 */
            --primary: #009FB1;
            --primary-light: #5BC4CF;
            --primary-dark: #1E859A;
            --accent: #FF6F00;
            --warning: #D32F2F;
            --bg-light: #F5F5F5;
            --text-dark: #212121;
            --text-light: #757575;
            --border: #E0E0E0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* emoji 专用字体，防止 Windows 渲染为方块 */
        .emoji {
            font-family: "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", sans-serif;
            font-style: normal;
        }

        body {
            font-family: "Microsoft YaHei", "微软雅黑", "PingFang SC", "Segoe UI", "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", sans-serif;
            background: #edf8fa;
            background: linear-gradient(135deg, #E8F6F8 0%, #F0FDF9 100%);
            min-height: 100vh;
            padding: 20px;
            color: #212121;
            color: var(--text-dark);
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header-logo {
            display: inline-block;
            background: white;
            padding: 16px 32px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 159, 177, 0.1);
            margin-bottom: 20px;
        }

        .header-logo img {
            height: 44px;
            width: auto;
            display: block;
        }

        header h1 {
            color: var(--primary-dark);
            font-size: 26px;
            margin-bottom: 8px;
        }

        header p {
            color: var(--text-light);
            font-size: 14px;
        }

        .form-section {
            background: white;
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        .form-section h2 {
            color: var(--primary);
            font-size: 18px;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--primary-light);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            font-weight: 600;
            color: var(--text-dark);
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .form-group label .required {
            color: var(--warning);
        }

        .paste-section {
            background: linear-gradient(135deg, #E8F6F8 0%, #E8F6F8 100%);
            border: 2px dashed var(--primary);
        }

        .paste-section h2 {
            border-bottom-color: var(--accent);
        }

        .paste-box {
            width: 100%;
            min-height: 120px;
            padding: 16px;
            border: 2px solid var(--border);
            border-radius: 10px;
            font-size: 14px;
            line-height: 1.6;
            resize: vertical;
            font-family: inherit;
            background: white;
            transition: all 0.3s ease;
        }

        .paste-box:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(0, 159, 177, 0.15);
        }

        .paste-hint {
            font-size: 12px;
            color: var(--text-light);
            margin-top: 8px;
        }

        .paste-result {
            margin-top: 12px;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 13px;
        }

        .paste-result.success {
            background: rgba(0, 159, 177, 0.1);
            border: 1px solid var(--primary-light);
            color: var(--primary-dark);
        }

        .paste-result.error {
            background: #FFEBEE;
            border: 1px solid var(--warning);
            color: var(--warning);
        }

        .btn-parse {
            margin-top: 12px;
            padding: 10px 24px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-parse:hover {
            background: #E65100;
        }

        .form-group input,
        .form-group select {
            padding: 12px 16px;
            border: 2px solid var(--border);
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s ease;
            background: white;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--primary-light);
            box-shadow: 0 0 0 4px rgba(0, 159, 177, 0.15);
        }

        .form-group .hint {
            font-size: 12px;
            color: var(--text-light);
        }

        .gender-group {
            display: flex;
            gap: 12px;
        }

        .gender-option {
            flex: 1;
            padding: 12px;
            border: 2px solid var(--border);
            border-radius: 10px;
            cursor: pointer;
            text-align: center;
            transition: all 0.3s ease;
            background: white;
        }

        .gender-option:hover {
            border-color: var(--primary-light);
        }

        .gender-option.selected {
            border-color: var(--primary);
            background: rgba(0, 159, 177, 0.1);
            color: var(--primary-dark);
            font-weight: 600;
        }

        .btn-primary {
            width: 100%;
            padding: 16px 32px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 159, 177, 0.35);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        /* 指引预览 */
        .preview-section {
            background: white;
            border-radius: 16px;
            padding: 30px;
            margin-top: 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            display: none;
        }

        .preview-section.visible {
            display: block;
        }

        .preview-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .preview-header h2 {
            color: var(--primary);
            font-size: 18px;
        }

        .btn-actions {
            display: flex;
            gap: 10px;
        }

        .btn-print {
            padding: 10px 20px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-print:hover {
            background: var(--primary-dark);
        }

        .btn-pdf {
            padding: 10px 20px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-pdf:hover {
            background: #E65100;
        }

        .btn-print:disabled,
        .btn-pdf:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .guide-content {
            background: #FEFEFE;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 32px;
            font-size: 15px;
            line-height: 1.8;
        }

        .guide-header {
            text-align: center;
            border-bottom: 2px solid var(--primary);
            padding-bottom: 20px;
            margin-bottom: 24px;
        }

        .guide-header h1 {
            color: var(--primary-dark);
            font-size: 24px;
            margin-bottom: 16px;
        }

        .patient-name {
            color: var(--accent);
            font-size: 22px;
            font-weight: bold;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin: 20px 0;
            padding: 20px;
            background: rgba(0, 159, 177, 0.08);
            border-radius: 10px;
        }

        .info-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .info-item .label {
            font-size: 12px;
            color: var(--text-light);
            text-transform: uppercase;
        }

        .info-item .value {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-dark);
        }

        .timeline {
            margin: 24px 0;
        }

        .timeline h3 {
            color: var(--primary-dark);
            font-size: 18px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .timeline-table {
            width: 100%;
            border-collapse: collapse;
            margin: 16px 0;
        }

        .timeline-table th,
        .timeline-table td {
            padding: 14px 20px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        .timeline-table th:nth-child(1) { width: 100px; }  /* 时间列 */
        .timeline-table th:nth-child(2) { width: 90px; }   /* 步骤列 */
        .timeline-table th:nth-child(3) { width: auto; }   /* 具体操作列 */
        .timeline-table td:nth-child(2) { white-space: nowrap; }  /* 步骤不换行 */

        .timeline-table th {
            background: rgba(0, 159, 177, 0.1);
            color: var(--primary-dark);
            font-weight: 600;
        }

        .timeline-table tr:hover {
            background: rgba(0, 159, 177, 0.03);
        }

        .time-cell {
            font-weight: bold;
            color: var(--primary-dark);
            white-space: nowrap;
        }

        .alert-cell {
            background: #FFF3E0 !important;
        }

        .alert-warning {
            color: var(--accent);
            font-weight: bold;
        }

        .section {
            margin: 24px 0;
        }

        .section h4 {
            color: var(--primary-dark);
            font-size: 16px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .diet-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin: 12px 0;
        }

        .diet-allowed, .diet-forbidden {
            padding: 16px;
            border-radius: 10px;
        }

        .diet-allowed {
            background: rgba(0, 159, 177, 0.08);
            border-left: 4px solid var(--primary);
        }

        .diet-forbidden {
            background: #FFEBEE;
            border-left: 4px solid var(--warning);
        }

        .diet-allowed h5, .diet-forbidden h5 {
            font-size: 14px;
            margin-bottom: 8px;
        }

        .diet-allowed h5 { color: var(--primary-dark); }
        .diet-forbidden h5 { color: var(--warning); }

        .diet-allowed ul, .diet-forbidden ul {
            font-size: 13px;
            padding-left: 20px;
            color: var(--text-dark);
        }

        .diet-allowed ul li, .diet-forbidden ul li {
            margin-bottom: 4px;
        }

        .important-notes {
            background: #FFF8E1;
            border: 1px solid #FFE082;
            border-radius: 10px;
            padding: 20px;
            margin: 20px 0;
        }

        .important-notes h4 {
            color: var(--accent);
            margin-bottom: 12px;
        }

        .important-notes ul {
            padding-left: 24px;
        }

        .important-notes li {
            margin-bottom: 8px;
            font-size: 14px;
        }

        .contact-info {
            text-align: center;
            padding: 12px 16px;
            background: linear-gradient(135deg, #009FB1 0%, #1E859A 100%);
            color: white;
            border-radius: 10px;
            margin-top: 16px;
        }

        .contact-info p {
            margin: 6px 0;
            font-size: 14px;
            color: rgba(255,255,255,0.95);
        }

        .contact-info p[style*="opacity: 0.9"] {
            color: rgba(255,255,255,0.9) !important;
        }

        .contact-info strong {
            color: white;
        }

        .contact-info .phone {
            font-size: 20px;
            font-weight: bold;
            letter-spacing: 2px;
        }

        .footer {
            text-align: center;
            margin-top: 0;
            padding-top: 16px;
        }

        .footer p {
            margin: 6px 0;
            font-size: 12px;
        }

        .footer p:first-child {
            color: #fff;
            font-weight: 500;
        }

        .footer p:last-child {
            color: #fff;
        }

        /* ========== 响应式布局 - 手机适配 ========== */
        @media screen and (max-width: 768px) {
            body {
                padding: 12px;
            }

            .container {
                max-width: 100%;
            }

            header {
                margin-bottom: 20px;
            }

            .header-logo {
                padding: 12px 20px;
            }

            .header-logo img {
                height: 36px;
            }

            header h1 {
                font-size: 20px;
            }

            .form-section {
                padding: 20px;
                margin-bottom: 16px;
                border-radius: 12px;
            }

            .form-section h2 {
                font-size: 16px;
                margin-bottom: 16px;
            }

            .form-grid {
                grid-template-columns: 1fr;
                gap: 16px;
            }

            .gender-group {
                flex-direction: row;
            }

            .gender-option {
                flex: 1;
                text-align: center;
                padding: 10px;
            }

            .btn-primary {
                width: 100%;
                padding: 14px 20px;
                font-size: 16px;
            }

            .preview-header {
                flex-direction: column;
                gap: 12px;
            }

            .preview-header h2 {
                font-size: 18px;
            }

            .btn-actions {
                width: 100%;
                flex-direction: column;
            }

            .btn-print,
            .btn-pdf {
                width: 100%;
                justify-content: center;
            }

            /* 指引预览区域手机适配 */
            .guide-content {
                padding: 16px;
            }

            .guide-header {
                padding: 16px;
            }

            .guide-header h1 {
                font-size: 18px;
            }

            .patient-name {
                font-size: 16px;
            }

            .info-grid {
                grid-template-columns: 1fr;
                gap: 8px;
                padding: 12px;
            }

            .section {
                padding: 16px;
                margin-bottom: 12px;
            }

            .section h4 {
                font-size: 15px;
                margin-bottom: 10px;
            }

            .timeline-table {
                font-size: 12px;
                display: block;
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
            }

            .timeline-table tbody {
                display: flex;
                flex-direction: column;
                gap: 8px;
            }

            .timeline-table tr {
                display: flex;
                flex-direction: column;
                background: #fafafa;
                border-radius: 8px;
                padding: 10px 12px;
                border-left: 3px solid var(--primary);
            }

            .timeline-table tr.alert-cell {
                background: #FFF3E0;
                border-left-color: var(--accent);
            }

            .timeline-table td {
                padding: 4px 0;
                word-break: break-word;
                white-space: normal;
            }

            .timeline-table td:first-child {
                font-weight: bold;
                color: var(--primary-dark);
                font-size: 14px;
            }

            .timeline-table td:nth-child(2) {
                font-weight: 600;
                color: var(--text-dark);
                font-size: 13px;
            }

            .timeline-table td:nth-child(3) {
                color: var(--text-light);
                font-size: 12px;
                line-height: 1.5;
            }

            .important-notes {
                padding: 16px;
            }

            .important-notes li {
                font-size: 13px;
            }

            .contact-info {
                padding: 16px;
            }

            .contact-info .phone {
                font-size: 18px;
            }

            .footer {
                padding: 12px;
            }
        }

        /* 更小屏幕（320px-400px） */
        @media screen and (max-width: 400px) {
            body {
                padding: 8px;
            }

            header h1 {
                font-size: 18px;
            }

            .form-section {
                padding: 16px;
            }

            .form-section h2 {
                font-size: 15px;
            }

            .guide-header h1 {
                font-size: 16px;
            }

            .section h4 {
                font-size: 14px;
            }

            .timeline-table {
                font-size: 11px;
            }
        }

        @media print {
            @page {
                size: auto;
                margin: 10mm;
            }

            html, body {
                background: white;
                padding: 0;
                margin: 0;
                font-size: 11px;
                height: auto;
                overflow: visible;
            }

            /* 隐藏所有非内容区域 */
            header,
            .form-section,
            .preview-header,
            .btn-primary {
                display: none !important;
            }

            .container {
                max-width: 100%;
                margin: 0;
                padding: 0;
            }

            .preview-section {
                display: block !important;
                box-shadow: none;
                padding: 0;
                margin: 0;
                page-break-inside: avoid;
            }

            .guide-content {
                border: none;
                padding: 0;
                page-break-inside: avoid;
            }

            /* 强制单页打印 */
            .guide-content * {
                page-break-inside: avoid;
            }

            /* 优化打印字体和间距 */
            .guide-header {
                padding-bottom: 12px;
                margin-bottom: 16px;
            }

            .guide-header h1 {
                font-size: 16px;
                margin-bottom: 8px;
            }

            .patient-name {
                font-size: 16px;
            }

            .info-grid {
                margin: 10px 0;
                padding: 10px;
                gap: 10px;
            }

            .info-item .value {
                font-size: 13px;
            }

            .section {
                margin: 12px 0;
            }

            .section h4 {
                font-size: 13px;
                margin-bottom: 6px;
            }

            .timeline-table {
                font-size: 10px;
                margin: 8px 0;
            }

            .timeline-table th,
            .timeline-table td {
                padding: 6px 4px;
            }

            .diet-grid {
                gap: 8px;
                margin: 8px 0;
            }

            .diet-allowed, .diet-forbidden {
                padding: 8px;
            }

            .diet-allowed h5, .diet-forbidden h5 {
                font-size: 11px;
            }

            .diet-allowed ul, .diet-forbidden ul {
                font-size: 9px;
            }

            .important-notes {
                padding: 10px;
                margin: 12px 0;
            }

            .important-notes h4 {
                font-size: 12px;
            }

            .important-notes li {
                font-size: 9px;
                margin-bottom: 3px;
            }

            .contact-info {
                padding: 10px;
                margin-top: 12px;
            }

            .contact-info p {
                font-size: 10px;
                margin: 3px 0;
            }

            .footer {
                padding-top: 8px;
            }

            .footer p {
                font-size: 9px;
            }
        }

        @media (max-width: 600px) {
            .diet-grid {
                grid-template-columns: 1fr;
            }

            .timeline-table {
                font-size: 13px;
            }

            .timeline-table th,
            .timeline-table td {
                padding: 10px 8px;
            }
        }

        /* 列表项bullet颜色 */
        .preview-content ul,
        .important-notes ul,
        .diet-allowed ul,
        .diet-forbidden ul {
            list-style: none;
            padding-left: 0;
        }
        .preview-content ul li,
        .important-notes ul li,
        .diet-allowed ul li,
        .diet-forbidden ul li {
            position: relative;
            padding-left: 20px;
            margin-bottom: 8px;
            line-height: 1.6;
        }
        .preview-content ul li::before,
        .important-notes ul li::before,
        .diet-allowed ul li::before,
        .diet-forbidden ul li::before {
            content: "";
            position: absolute;
            left: 0;
            top: 8px;
            width: 8px;
            height: 8px;
            background: var(--primary);
            border-radius: 50%;
        }

        /* 手机端优化 */
        @media screen and (max-width: 768px) {
            .form-group input,
            .form-group select,
            textarea {
                min-height: 48px !important;
                font-size: 16px !important; /* 防止iOS缩放 */
                padding: 12px 14px !important;
            }

            .gender-option {
                min-height: 48px;
                display: flex;
                align-items: center;
                justify-content: center;
                -webkit-tap-highlight-color: transparent;
            }

            .btn-primary,
            .btn-parse,
            .btn-print,
            .btn-pdf {
                min-height: 48px;
                font-size: 16px;
                -webkit-tap-highlight-color: transparent;
            }

            .exam-type-grid {
                grid-template-columns: 1fr !important;
            }

            .exam-type-option {
                min-height: 60px;
            }
        }
    </style>
</head>
<body>
    <div class="container">

            <h1>胃肠镜检查术前准备指引生成</h1>
            <p>根据预约信息自动生成专属客户的准备指南</p>
        </header>

        <div class="form-section paste-section">
            <h2><span class="emoji">📋</span> 预约信息（选填：可直接粘贴识别）</h2>
            <textarea class="paste-box" id="pasteBox" placeholder="粘贴任意格式的预约信息（如从MIS或钉钉复制）&#10;&#10;示例：&#10;• 李四 5月15日 15:30 胃肠镜&#10;• 姓名张三 胃肠镜 3包&#10;• 或直接填写下方表单"></textarea>
            <button class="btn-parse" onclick="parseAppointment()">
                <span class="emoji">🔍</span> 解析并填充
            </button>
            <div id="parseResult" class="paste-result" style="display: none;"></div>
            <p class="paste-hint"><span class="emoji">🔍</span> 粘贴后自动识别姓名、日期、时间；或直接填写下方表单</p>
        </div>

        <div class="form-section">
            <h2><span class="emoji">📋</span> 基本信息</h2>
            <div class="form-grid">
                <div class="form-group">
                    <label>姓名 <span class="required">*</span></label>
                    <input type="text" id="patientName" placeholder="请输入患者姓名">
                </div>
                <div class="form-group">
                    <label>称呼 <span class="required">*</span></label>
                    <div class="gender-group" id="genderGroup">
                        <div class="gender-option selected" data-value="女士" onclick="selectGender(this)">♀ 女士</div>
                        <div class="gender-option" data-value="先生" onclick="selectGender(this)">♂ 先生</div>
                    </div>
                </div>
                <div class="form-group">
                    <label>语言</label>
                    <div class="gender-group" id="languageGroup">
                        <div class="gender-option selected" data-value="zh" onclick="selectLanguage(this)"><span class="emoji">🇨🇳</span> 中文</div>
                        <div class="gender-option" data-value="en" onclick="selectLanguage(this)"><span class="emoji">🇺🇸</span> English</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="form-section">
            <h2><span class="emoji">📅</span> 预约信息</h2>
            <div class="form-grid">
                <div class="form-group">
                    <label>预约日期 <span class="required">*</span></label>
                    <input type="date" id="appointmentDate">
                </div>
                <div class="form-group">
                    <label>预约时间 <span class="required">*</span></label>
                    <input type="time" id="appointmentTime" step="1800">
                </div>
                <div class="form-group">
                    <label>检查类型</label>
                    <select id="examType">
                        <option value="gastroscopy">仅胃镜</option>
                        <option value="combined" selected>胃镜+肠镜（胃肠镜）</option>
                        <option value="colonoscopy">仅肠镜</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>和爽用量</label>
                    <select id="heshuangPacks">
                        <option value="2">2包（2L溶液）</option>
                        <option value="3" selected>3包（3L溶液）</option>
                        <option value="4">4包（4L溶液）</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="form-section">
            <h2><span class="emoji">💊</span> 服药方案</h2>
            <div class="form-grid">
                <div class="form-group">
                    <label>检查时段</label>
                    <select id="examPeriod" onchange="updateTimeOptions()">
                        <option value="afternoon" selected>下午检查</option>
                        <option value="morning">上午检查</option>
                    </select>
                    <span class="hint">上午检查：前一晚20:00开始分次服药；下午检查：当天上午单次服药</span>
                </div>
                <div class="form-group">
                    <label>是否加服西甲硅油</label>
                    <select id="simethicone">
                        <option value="yes" selected>是（建议服用，消除气泡）</option>
                        <option value="no">否</option>
                    </select>
                </div>
            </div>
        </div>

        <button class="btn-primary" onclick="generateGuide()">
            <span>▶</span> 生成专属指引
        </button>

        <div class="preview-section" id="previewSection">
            <div class="preview-header">
                <h2><span class="emoji">📄</span> 指引预览</h2>
                <div class="btn-actions">
                    <button class="btn-print" onclick="saveAsImage()">
                        <span class="emoji">📎</span> 保存图片
                    </button>
                    <button class="btn-pdf" onclick="saveAsPDF()">
                        <span class="emoji">📄</span> 另存 PDF
                    </button>
                </div>
            </div>
            <div class="guide-content" id="guideContent">
                <!-- 动态生成的内容将在这里 -->
            </div>
        </div>
    </div>

        // 保存为图片
        async function saveAsImage() {
            if (typeof html2canvas === 'undefined') {
                alert('图片保存功能加载失败，请检查网络连接后刷新页面重试');
                return;
            }
            const guideContent = document.getElementById('guideContent');

            try {
                btn.disabled = true;
                btn.innerHTML = '<span class="emoji">⏳</span> 生成中...';

                const canvas = await html2canvas(guideContent, {
                    scale: 2,
                    useCORS: true,
                    backgroundColor: '#ffffff',

                });

                const link = document.createElement('a');
                link.download = getExportFilename('png');
                link.href = canvas.toDataURL('image/png');

                link.click();
                document.body.removeChild(link);
            } catch (error) {
                console.error('保存失败:', error);

                btn.innerHTML = '<span class="emoji">📎</span> 保存图片';

        // 另存为 PDF
        async function saveAsPDF() {
            if (typeof html2canvas === 'undefined' || typeof window.jspdf === 'undefined') {
                alert('PDF保存功能加载失败，请检查网络连接后刷新页面重试');
                return;
            }
            const guideContent = document.getElementById('guideContent');
            const btn = document.querySelector('.btn-pdf');

            try {
                btn.disabled = true;
                btn.innerHTML = '<span class="emoji">⏳</span> 生成中...';

                const canvas = await html2canvas(guideContent, {
                    scale: 2,
                    useCORS: true,
                    backgroundColor: '#ffffff',
                    logging: false
                });

                const imgData = canvas.toDataURL('image/png');
                const { jsPDF } = window.jspdf;

                // A4 尺寸：210 x 297 mm
                const pdfWidth = 210;
                const pdfHeight = (canvas.height * pdfWidth) / canvas.width;

                const pdf = new jsPDF({
                    orientation: pdfHeight > pdfWidth ? 'portrait' : 'landscape',
                    unit: 'mm',
                    format: [pdfWidth, pdfHeight]
                });

                pdf.addImage(imgData, 'PNG', 0, 0, pdfWidth, pdfHeight);
                pdf.save(getExportFilename('pdf'));
            } catch (error) {
                console.error('PDF生成失败:', error);
                alert('PDF生成失败，请重试');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<span class="emoji">📄</span> 另存 PDF';
            }
        }

        function parseAppointment() {
            const text = document.getElementById('pasteBox').value.trim();
            const resultDiv = document.getElementById('parseResult');

            if (!text) {
                resultDiv.className = 'paste-result error';
                resultDiv.style.display = 'block';
                resultDiv.innerHTML = '❌ 请粘贴预约信息';
                return;
            }

            const result = {
                name: '',
                date: '',
                time: '',
                examType: '',
                packs: ''
            };

            const lines = text.split(/[\n,，;；]+/).map(l => l.trim()).filter(l => l);
            const fullText = text.replace(/\s+/g, '');  // 去除所有空格用于匹配

            // ========== 1. 解析姓名 - 自由模式：找第一个2-4个连续汉字 ==========
            // 常见姓名汉字列表（增加识别准确性）
            const commonNameChars = /[赵钱孙李周吴郑王冯陈褚卫蒋沈韩杨朱秦尤许何吕施张孔曹严华金魏陶姜戚谢邹喻柏水窦章云苏潘葛奚范彭郎鲁韦昌马苗凤花方俞任袁柳酆鲍史唐费廉岑薛雷贺倪汤滕殷罗毕郝邬安常乐于时傅皮卞齐康伍余元卜顾孟平黄和穆萧尹姚邵堪汪祁毛禹狄米贝明臧计伏成戴谈宋茅庞熊纪舒屈项祝董梁杜阮蓝闵席季麻强贾路娄危江童颜郭梅盛林刁钟徐邱骆高夏蔡田丁番palxmnestrHdoudy]/;

            if (!result.name) {
                // 策略1：找 "X名" 或 "姓名" 后面的内容
                const nameLabelMatch = text.match(/[姓就]名[：:\s]*([\u4e00-\u9fa5]{2,4})/);
                if (nameLabelMatch) {
                    result.name = nameLabelMatch[1];
                } else {
                    // 策略2：在文本中找第一个2-4个连续汉字（排除常见词）
                    const nameMatches = text.match(/[\u4e00-\u9fa5]{2,4}/g) || [];
                    for (const match of nameMatches) {
                        // 排除常见非姓名词汇
                        if (!/^[检查预约时间日期电话手机地址号房间科室医生护士年年月日时分秒]/.test(match) &&
                            !/[检查预约时间日期电话手机地址号房间科室医生护士年年月日时分秒]$/.test(match) &&
                            match.length >= 2) {
                            result.name = match;
                            break;
                        }
                    }
                }
            }

            // ========== 2. 解析日期 - 支持多种格式 ==========
            const datePatterns = [
                /(\d{4})年(\d{1,2})月(\d{1,2})日/,
                /(\d{4})-(\d{1,2})-(\d{1,2})/,
                /(\d{4})(\d{2})(\d{2})/,
                /(\d{1,2})月(\d{1,2})日/,  // 需结合当前年份
                /(\d{1,2})\/(\d{1,2})\/?/,  // 需结合当前年份
                /(\d{1,2})-(\d{1,2})(?!\d)/  // 需结合当前年份，如 5-30
            ];
            for (const pattern of datePatterns) {
                const match = text.match(pattern);
                if (match) {
                    if (match[1].length === 4) {
                        result.date = `${match[1]}-${match[2].padStart(2,'0')}-${match[3].padStart(2,'0')}`;
                    } else {
                        // 短日期格式使用当前年份
                        const year = new Date().getFullYear();
                        result.date = `${year}-${match[1].padStart(2,'0')}-${match[2].padStart(2,'0')}`;
                    }
                    break;
                }
            }

            // ========== 3. 解析时间 - 找 HH:MM 或 HH:MM 格式 ==========
            const timeMatch = text.match(/(\d{1,2}):(\d{2})/);
            if (timeMatch) {
                const hour = parseInt(timeMatch[1]);
                const minute = timeMatch[2];
                if (hour >= 0 && hour <= 23) {
                    result.time = `${String(hour).padStart(2,'0')}:${minute}`;
                }
            }

            // 解析检查类型
            const textLower = text.toLowerCase();
            if (textLower.includes('胃肠') || textLower.includes('胃+肠') || textLower.includes('胃镜肠镜')) {
                result.examType = 'combined';
            } else if (textLower.includes('胃镜') && !textLower.includes('肠镜')) {
                result.examType = 'gastroscopy';
            } else if (textLower.includes('肠镜') || textLower.includes('结肠镜')) {
                result.examType = 'colonoscopy';
            }

            // 解析和爽用量
            const packMatch = text.match(/(\d)\s*包/);
            if (packMatch) {
                result.packs = packMatch[1];
            }

            // 判断上午/下午
            if (result.time) {
                const hour = parseInt(result.time.split(':')[0]);
                if (hour >= 8 && hour <= 11) {
                    document.getElementById('examPeriod').value = 'morning';
                } else if (hour >= 13 && hour <= 16) {
                    document.getElementById('examPeriod').value = 'afternoon';
                }
            }

            // 填充表单
            if (result.name) document.getElementById('patientName').value = result.name;
            if (result.date) document.getElementById('appointmentDate').value = result.date;
            if (result.time) document.getElementById('appointmentTime').value = result.time;
            if (result.examType) document.getElementById('examType').value = result.examType;
            if (result.packs) document.getElementById('heshuangPacks').value = result.packs;

            // 判断性别
            if (result.name) {
                // 简单的性别判断：名字最后一个字
                const lastChar = result.name.slice(-1);
                const male = lastChar.match(/[君|轩|宇|浩|明|伟|强|磊|超|鹏|杰|凯|博|达|帆|翔|霖|晨|瑞|鑫|航|然|博|丞|睿|洋|威|豪|波|峰|峰|健|昌|诚|川|成|崇]/);
                if (male) {
                    document.querySelectorAll('.gender-option').forEach(el => el.classList.remove('selected'));
                    document.querySelector('[data-value="先生"]').classList.add('selected');
                    selectedGender = '先生';
                }
            }

            // 显示解析结果
            const foundItems = [];
            if (result.name) foundItems.push(`姓名：${result.name}`);
            if (result.date) foundItems.push(`日期：${result.date}`);
            if (result.time) foundItems.push(`时间：${result.time}`);
            if (result.examType) foundItems.push(`类型：${result.examType === 'combined' ? '胃肠镜' : result.examType === 'gastroscopy' ? '胃镜' : '肠镜'}`);
            if (result.packs) foundItems.push(`和爽：${result.packs}包`);

            resultDiv.className = 'paste-result success';
            resultDiv.style.display = 'block';
            if (foundItems.length > 0) {
                resultDiv.innerHTML = `✅ 已解析并填充：${foundItems.join(' | ')}`;
            } else {
                resultDiv.className = 'paste-result error';
                resultDiv.innerHTML = '⚠️ 仅识别到部分信息，请手动补充';
            }
        }

        function getWeekday(dateStr) {
            const date = new Date(dateStr);
            const weekdays = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];

        function formatDate(dateStr) {
            const date = new Date(dateStr);
            const year = date.getFullYear();
            const month = date.getMonth() + 1;
            const day = date.getDate();
            const monthNames = ['', 'January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
            return selectedLanguage === 'en' ? `${monthNames[month]} ${day}, ${year}` : `${year}年${month}月${day}日`;
        }

        function addHours(timeStr, hours) {
            const [hoursNum, minutes] = timeStr.split(':').map(Number);
            const totalMinutes = hoursNum * 60 + minutes + hours * 60;
            const newHours = Math.floor(totalMinutes / 60);
            const newMinutes = totalMinutes % 60;
            return `${String(newHours).padStart(2, '0')}:${String(newMinutes).padStart(2, '0')}`;
        }

        function subtractMinutes(timeStr, minutes) {
            return addHours(timeStr, -minutes / 60);
        }

        // 准确时间表数据（根据图片中的表格）
        const timeTable = {
            morning: {
                '08:30': { firstDrink: '前一天20:00', secondDrink2_3: '5:00', secondDrink4: '4:30', stopWater: '6:30', fasting: '前一天20:00' },

                '11:30': { firstDrink: '前一天20:00', secondDrink2_3: '7:30', secondDrink4: '7:00', stopWater: '9:30', fasting: '前一天20:00' }
            },
            afternoon: {
                '13:30': { fasting: '5:30', drink2_3: '8:30', drink4: '7:30', stopWater: '11:30' },
                '14:30': { fasting: '6:30', drink2_3: '9:30', drink4: '8:30', stopWater: '12:30' },
                '15:30': { fasting: '7:30', drink2_3: '10:30', drink4: '9:30', stopWater: '13:30' },
                '16:30': { fasting: '8:30', drink2_3: '11:30', drink4: '10:30', stopWater: '14:30' }
            }
        };

        function getNearestTime(period, timeStr) {
            // 将时间转换为分钟数进行比较
            const [h, m] = timeStr.split(':').map(Number);
            const timeMinutes = h * 60 + m;

            const times = Object.keys(timeTable[period]).sort();
            let nearest = times[0];
            let minDiff = Infinity;

            for (const t of times) {
                const [th, tm] = t.split(':').map(Number);
                const tMinutes = th * 60 + tm;
                const diff = Math.abs(tMinutes - timeMinutes);
                if (diff < minDiff) {
                    minDiff = diff;
                    nearest = t;
                }
            }
            return nearest;
        }

            // 获取准确时间
            const nearestTime = getNearestTime(examPeriod, appointmentTime);
            const schedule = timeTable[examPeriod][nearestTime];

            const simethiconeYes = simethicone === 'yes' ? (selectedLanguage === 'en' ? '+ Simethicone 1 bottle' : '+ 西甲硅油 1 瓶') : '';
            const simethiconeDesc = simethicone === 'yes' ? (selectedLanguage === 'en' ? '<br>4. After finishing, take 15ml Simethicone' : '<br>4. 喝完后，用针筒抽取西甲硅油15ml服用') : '';
            const arriveText = selectedLanguage === 'en' ? 'Please arrive 10 minutes early' : '请提前10分钟抵达诊所报到';
            const lowResidueText = selectedLanguage === 'en' ? 'Low-Residue Diet' : '低渣饮食';

            let timelineRows = [];
            let medicationSteps = '';

            if (examPeriod === 'afternoon') {
                const fastingTime = schedule.fasting;
                const drinkTime = heshuangPacks === 4 ? schedule.drink4 : schedule.drink2_3;
                const stopWaterTime = schedule.stopWater;

                timelineRows = [
                    { date: prevDateFormatted, time: selectedLanguage === 'en' ? 'All day' : '全天', event: lowResidueText, isAlert: false },
                    { date: formattedDate, time: fastingTime, event: (selectedLanguage === 'en' ? 'Start Fasting (clear liquids only)' : '<span class="emoji">⚠️</span> 开始禁食（只能喝清流质）'), isAlert: true },
                    { date: formattedDate, time: drinkTime, event: (selectedLanguage === 'en' ? 'Take bowel prep (' : '开始喝药（') + heshuangPacks + (selectedLanguage === 'en' ? ' packets PEG + ' : '包和爽 + ') + heshuangPacks + (selectedLanguage === 'en' ? '000ml water)' : '000ml 水）') + simethiconeYes, isAlert: false },
                    { date: formattedDate, time: stopWaterTime, event: (selectedLanguage === 'en' ? 'Stop All Liquids' : '<span class="emoji">⚠️</span> 开始禁水（不能再喝任何液体）'), isAlert: true },
                    { date: formattedDate, time: arriveTime, event: arriveText, isAlert: false }
                ];

                medicationSteps = `
                    <tr class="alert-cell">
                        <td class="time-cell">${formattedDate} ${fastingTime}<br><small style="color:#009FB1">${selectedLanguage === 'en' ? '(Day of Procedure)' : '（检查当天）'}</small></td>
                        <td class="alert-warning">${lang.labels.fasting}</td>
                        <td class="alert-warning">${lang.labels.fastingDesc}</td>
                    </tr>
                    <tr>
                        <td class="time-cell">${formattedDate} ${drinkTime}</td>
                        <td>${lang.labels.takeMed}</td>
                        <td>${lang.labels.takeMedDesc.replaceAll('${packs}', heshuangPacks).replace('${volume}', heshuangPacks * 1000).replace('${simethiconeDesc}', simethiconeDesc)}</td>
                    </tr>
                    <tr class="alert-cell">
                        <td class="time-cell">${formattedDate} ${stopWaterTime}</td>
                        <td class="alert-warning">${lang.labels.stopWater}</td>
                        <td class="alert-warning">${lang.labels.stopWaterDesc}</td>
                    </tr>
                `;
            } else {
                const firstDrinkTime = schedule.firstDrink;
                const secondDrinkTime = heshuangPacks === 4 ? schedule.secondDrink4 : schedule.secondDrink2_3;
                const stopWaterTime = schedule.stopWater;

                let firstPacks, secondPacks;
                if (heshuangPacks === 2) {
                    firstPacks = 1; secondPacks = 1;
                } else if (heshuangPacks === 3) {
                    firstPacks = 2; secondPacks = 1;
                } else {
                    firstPacks = 2; secondPacks = 2;
                }

                timelineRows = [
                    { date: prevDateFormatted, time: selectedLanguage === 'en' ? 'All day' : '全天', event: lowResidueText, isAlert: false },
                    { date: prevDateFormatted, time: '20:00', event: (selectedLanguage === 'en' ? '1st Dose (' : '第1次服用（') + firstPacks + (selectedLanguage === 'en' ? ' packet(s) PEG + ' : '包和爽 + ') + firstPacks + (selectedLanguage === 'en' ? '000ml water)' : '000ml 水') + (selectedLanguage === 'en' ? ', then fast' : '），服药后开始禁食'), isAlert: true },
                    { date: formattedDate, time: secondDrinkTime, event: (selectedLanguage === 'en' ? '2nd Dose (' : '第2次服用（') + secondPacks + (selectedLanguage === 'en' ? ' packet(s) PEG + ' : '包和爽 + ') + secondPacks + (selectedLanguage === 'en' ? '000ml water)' : '000ml 水）') + simethiconeYes, isAlert: false },
                    { date: formattedDate, time: stopWaterTime, event: (selectedLanguage === 'en' ? 'Stop All Liquids' : '<span class="emoji">⚠️</span> 开始禁水（不能再喝任何液体）'), isAlert: true },
                    { date: formattedDate, time: arriveTime, event: arriveText, isAlert: false }
                ];

                medicationSteps = `
                    <tr class="alert-cell">
                        <td class="time-cell">${prevDateFormatted} 20:00<br><small style="color:#009FB1">${selectedLanguage === 'en' ? '(Day before)' : '（检查前一天）'}</small></td>
                        <td class="alert-warning">${lang.labels.firstDose}</td>
                        <td class="alert-warning">${lang.labels.firstDoseDesc.replaceAll('${packs}', firstPacks).replace('${volume}', firstPacks * 1000)}</td>
                    </tr>
                    <tr>
                        <td class="time-cell">${formattedDate} ${secondDrinkTime}</td>
                        <td>${lang.labels.secondDose}</td>
                        <td>${lang.labels.secondDoseDesc.replaceAll('${packs}', secondPacks).replace('${volume}', secondPacks * 1000).replace('${simethiconeDesc}', simethiconeDesc)}</td>
                    </tr>
                    <tr class="alert-cell">
                        <td class="time-cell">${formattedDate} ${stopWaterTime}</td>
                        <td class="alert-warning">${lang.labels.stopWater}</td>
                        <td class="alert-warning">${lang.labels.stopWaterDesc}</td>
                    </tr>
                `;
            }

            const title = lang.title.replace('${examTypeText}', examTypeText);
            const greeting = lang.greeting.replace('${name}', name).replace('${selectedGender}', displayGender);
            const dietTitle = lang.labels.dietTitle.replace('${date}', prevDateFormatted);

            const html = generateHTML(title, greeting, formattedDate, weekday, appointmentTime, examTypeText, examTypeDesc, timelineRows, medicationSteps, dietTitle, heshuangPacks, simethiconeYes, lang, prevDateFormatted, simethiconeDesc);

            document.getElementById('guideContent').innerHTML = html;
            document.getElementById('previewSection').classList.add('visible');
            document.getElementById('previewSection').scrollIntoView({ behavior: 'smooth' });
        }
